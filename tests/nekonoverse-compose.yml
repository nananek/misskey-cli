services:
  app:
    image: ghcr.io/nekonoverse/nekonoverse-backend:latest
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://nekonoverse:test-password@postgresql:5432/nekonoverse
      VALKEY_URL: valkey://valkey:6379/0
      DOMAIN: app:8000
      USE_HTTPS: "false"
      SECRET_KEY: test-secret-key-do-not-use-in-production
      FRONTEND_URL: http://app:8000
      DEBUG: "true"
      REGISTRATION_OPEN: "true"
      S3_ENDPOINT_URL: http://nekono3s:8080
      S3_ACCESS_KEY_ID: nekonoverse
      S3_SECRET_ACCESS_KEY: test-s3-secret
      S3_BUCKET: nekonoverse
      S3_REGION: us-east-1
    expose:
      - "8000"
    networks:
      - net
    depends_on:
      postgresql:
        condition: service_healthy
      valkey:
        condition: service_healthy
      nekono3s:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/.well-known/nodeinfo', timeout=2)"]
      interval: 5s
      timeout: 5s
      retries: 40
      start_period: 30s

  worker:
    image: ghcr.io/nekonoverse/nekonoverse-backend:latest
    command: python -m app.worker.main
    environment:
      DATABASE_URL: postgresql+asyncpg://nekonoverse:test-password@postgresql:5432/nekonoverse
      VALKEY_URL: valkey://valkey:6379/0
      DOMAIN: app:8000
      USE_HTTPS: "false"
      SECRET_KEY: test-secret-key-do-not-use-in-production
      FRONTEND_URL: http://app:8000
      S3_ENDPOINT_URL: http://nekono3s:8080
      S3_ACCESS_KEY_ID: nekonoverse
      S3_SECRET_ACCESS_KEY: test-s3-secret
      S3_BUCKET: nekonoverse
      S3_REGION: us-east-1
    networks:
      - net
    depends_on:
      postgresql:
        condition: service_healthy
      valkey:
        condition: service_healthy
      nekono3s:
        condition: service_healthy

  postgresql:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: nekonoverse
      POSTGRES_USER: nekonoverse
      POSTGRES_PASSWORD: test-password
    networks:
      - net
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "nekonoverse"]
      interval: 5s
      timeout: 5s
      retries: 20

  valkey:
    image: valkey/valkey:8-alpine
    networks:
      - net
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  nekono3s:
    image: ghcr.io/nananek/nekono3s:latest
    environment:
      S3_ACCESS_KEY_ID: nekonoverse
      S3_SECRET_ACCESS_KEY: test-s3-secret
      S3_STORAGE_PATH: /data
      S3_REGION: us-east-1
      S3_XATTR_JCLOUDS_COMPAT: "true"
    networks:
      - net
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('localhost',8080),2); s.close()"]
      interval: 5s
      timeout: 5s
      retries: 20

networks:
  net:
