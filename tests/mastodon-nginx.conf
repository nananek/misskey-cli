server {
    listen 3000;
    server_name _;

    location / {
        proxy_pass http://mastodon-app:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Trick Mastodon's ActionDispatch::SSL middleware into treating us as
        # already-HTTPS, so it skips the 301 redirect Mastodon normally forces
        # in production.
        proxy_set_header X-Forwarded-Proto https;
    }
}
